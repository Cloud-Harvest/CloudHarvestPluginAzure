report:
  name: reports.azure.regions
  description: Generates a list of all Azure regions, colloquially known as "locations", where resources can be deployed.
  headers:
    - Region
    - DisplayName
    - Latitude
    - Longitude

  tasks:
    - azure:
        name: Retrieve information on Azure resource groups
        command: "azure.mgmt.subscription:SubscriptionClient.list_locations"
        arguments:
          subscription_id: var.subscription_id
        type: regions
        # paginator_method: as_dict    # default
        result_as: azure_regions

    - dataset:
        name: modify the result
        data: var.azure_regions
        result_as: result
        filters: '.*'
        stages:
          - title_keys:   # convert lower case keys to TitleCase
              remove_characters:
                - '_'
          - copy_key:
              source_key: Name
              target_key: Region    # for compatibility with other cloud providers
